; app/src/main/assets/config.ini
; ====================================
; APP KONFIGURATION
; ====================================

# ===================================
# DEFAULT - Fallback Werte
# ===================================
[DEFAULT]
APP_VERSION = 1.2.1
DEBUG = true
TIMEOUT = 30
MAX_RETRIES = 3
DIALOG_DELAY = 3000
SSHD_PORT = 2222
SSHD_ENABLED = true
FTP_PORT = 2135
FTP_ENABLED = true
LOG_DIR = /sdcard/logs
PYTHON_HOME = /usr/bin/python3

# ==================================
# ALPINE LINUX
# ==================================
[ALPINE]
ROOTFS_TYPE = alpine
ROOTFS_FILE = alpine.tar.gz
ROOTFS_DIR = alpine
INIT_SCRIPT = alpine/init.sh
INIT_HOST_SCRIPT = alpine/init-host.sh
SSHD_PORT = 2222
SSHD_ENABLED = true
FTP_PORT = 2135
FTP_ENABLED = true
TIMEOUT = 30
DIALOG_DELAY = 3000

# ==================================
# UBUNTU LINUX
# ==================================
[UBUNTU]
; rootfs_type: Welches Rootfs verwendet werden soll
; Werte: "alpine", "ubuntu"
ROOTFS_TYPE = ubuntu
; rootfs_file: Name der Rootfs-Datei im files-Verzeichnis
ROOTFS_FILE = ubuntu.tar.gz

; rootfs_dir: Verzeichnis im assets-Ordner
ROOTFS_DIR = ubuntu

; init_script: Name des Init-Skripts (in assets)
INIT_SCRIPT = ubuntu/init.sh

; init_host_script: Name des Init-Host-Skripts (in assets)
INIT_HOST_SCRIPT = ubuntu/init-host.sh
SSHD_PORT = 2233
SSHD_ENABLED = true
FTP_PORT = 2140
FTP_ENABLED = true

TIMEOUT = 60
DIALOG_DELAY = 5000

[APP]
DIALOG_DELAY = 3000
APP_VERSION = 1.2.1
DEBUG = true
TIMEOUT = 30
MAX_RETRIES = 3
; ★ ★ ★ working_mode: Welcher Modus verwendet werden soll ★ ★ ★
; Werte: "alpine", "ubuntu", "android"
WORKING_MODE = alpine


[PATHS]
PYTHON_HOME = /data/user/0/com.meinname.loginapp8.debug/files/app
LOG_DIR = /sdcard/logs

